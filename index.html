<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wadi Soon App</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial}

/* ===== GLOBAL ===== */
body{
  background:linear-gradient(135deg,#0f172a,#1e3a8a,#3b82f6);
  color:#fff;
}

/* ===== LOGIN PAGE ===== */
#loginPage{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:360px;
  padding:30px;
  border-radius:22px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(18px);
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.card h2{margin-bottom:10px}

input{
  width:100%;
  padding:13px;
  margin:10px 0;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.15);
  color:#fff;
}

button{
  width:100%;
  padding:13px;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.login{background:linear-gradient(135deg,#00c6ff,#0072ff)}
.signup{background:linear-gradient(135deg,#22c55e,#15803d)}

.msg{margin-top:10px;font-size:14px}

/* ===== HOME PAGE ===== */
#homePage{
  display:none;
  padding:20px;
}

.header{
  text-align:center;
  font-size:28px;
  font-weight:bold;
  margin-bottom:20px;
}

.logout{
  position:fixed;
  top:15px;
  right:15px;
  background:#ef4444;
  padding:10px 15px;
  border-radius:10px;
}

/* ===== CHAT BUTTON ===== */
.chat-toggle{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  border:none;
  font-size:26px;
  color:#fff;
}

/* ===== CHAT BOX ===== */
.chat{
  position:fixed;
  bottom:100px;
  right:20px;
  width:330px;
  height:460px;
  display:none;
  flex-direction:column;
  border-radius:18px;
  overflow:hidden;
  background:rgba(15,23,42,0.95);
  backdrop-filter:blur(12px);
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

.chat.active{display:flex}

.chat-header{
  padding:12px;
  background:#020617;
  display:flex;
  justify-content:space-between;
}

/* CHAT AREA */
#chatBox{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msgBox{
  margin:6px 0;
  padding:10px;
  border-radius:12px;
}

.me{
  background:linear-gradient(135deg,#22c55e,#4ade80);
  color:#022c22;
}

.other{
  background:#1e293b;
}

/* INPUT */
.input-area{
  padding:10px;
  background:#020617;
}

.input-area textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-bottom:6px;
}

.input-area button{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- ===== LOGIN ===== -->
<div id="loginPage">
  <div class="card">
    <h2>🌿 Wadi Soon</h2>

    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">

    <button class="login" onclick="login()">Login</button>
    <button class="signup" onclick="signup()">Signup</button>

    <div class="msg" id="msg"></div>
  </div>
</div>

<!-- ===== HOME ===== -->
<div id="homePage">
  <div class="header">🌍 Welcome to Wadi Soon</div>
  <button class="logout" onclick="logout()">Logout</button>

  <p style="text-align:center;margin-top:40px">
    Beautiful Valley UI + Chat System Working ✅
  </p>
</div>

<!-- CHAT -->
<button class="chat-toggle" onclick="toggleChat()">💬</button>

<div class="chat" id="chat">
  <div class="chat-header">
    <span>Live Chat</span>
    <span onclick="toggleChat()">✖</span>
  </div>

  <div id="chatBox"></div>

  <div class="input-area">
    <textarea id="msgInput" placeholder="Type message..."></textarea>
    <button onclick="send()">Send</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
  apiKey: "AIzaSyDpERmy9jWQ5IS5GmyP54EZNdYDiKB-3RI",
  authDomain: "wadi-soon-site.firebaseapp.com",
  projectId: "wadi-soon-site"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* ELEMENTS */
const loginPage = document.getElementById("loginPage");
const homePage = document.getElementById("homePage");
const msg = document.getElementById("msg");
const email = document.getElementById("email");
const pass = document.getElementById("pass");

/* LOGIN */
window.login = async ()=>{
  try{
    await signInWithEmailAndPassword(auth,email.value,pass.value);
    msg.innerText="Login Successful";
  }catch(e){
    msg.innerText="Login Failed";
  }
};

/* SIGNUP */
window.signup = async ()=>{
  try{
    await createUserWithEmailAndPassword(auth,email.value,pass.value);
    msg.innerText="Account Created";
  }catch{
    msg.innerText="Signup Failed";
  }
};

/* LOGOUT */
window.logout = ()=>{
  signOut(auth);
};

/* AUTO SWITCH PAGE */
onAuthStateChanged(auth,(user)=>{
  if(user){
    loginPage.style.display="none";
    homePage.style.display="block";
  }else{
    loginPage.style.display="flex";
    homePage.style.display="none";
  }
});

/* CHAT */
let user = localStorage.getItem("u") || ("u"+Math.random());
localStorage.setItem("u",user);

window.toggleChat = ()=>{
  document.getElementById("chat").classList.toggle("active");
};

window.send = async ()=>{
  const text = msgInput.value.trim();
  if(!text) return;

  await addDoc(collection(db,"chat"),{
    text,
    user,
    time:Date.now()
  });

  msgInput.value="";
};

msgInput.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    e.preventDefault();
    send();
  }
});

onSnapshot(query(collection(db,"chat"), orderBy("time")), snap=>{
  chatBox.innerHTML="";
  snap.forEach(d=>{
    const m=d.data();
    const div=document.createElement("div");
    div.className="msgBox "+(m.user===user?"me":"other");
    div.innerText=m.text;
    chatBox.appendChild(div);
  });
  chatBox.scrollTop=chatBox.scrollHeight;
});

</script>

</body>
</html>
