<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wadi Soon Login</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#020617,#1e3a8a);
  color:#fff;
}

/* CARD */
.card{
  width:340px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  text-align:center;
}

/* TITLE */
.card h2{
  margin-bottom:20px;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:#0f172a;
  color:#fff;
}

/* BUTTON */
button{
  width:100%;
  padding:13px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.login{background:#2563eb;}
.signup{background:#22c55e;}

#msg{
  margin-top:10px;
  font-size:13px;
}
</style>
</head>

<body>

<div class="card">
  <h2>🌿 Wadi Soon</h2>

  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">

  <button class="login" onclick="login()">Login</button>
  <button class="signup" onclick="signup()">Sign Up</button>

  <div id="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpERmy9jWQ5IS5GmyP54EZNdYDiKB-3RI",
  authDomain: "wadi-soon-site.firebaseapp.com",
  projectId: "wadi-soon-site"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function show(t){
  document.getElementById("msg").innerText = t;
}

window.login = async ()=>{
  try{
    await signInWithEmailAndPassword(auth, email.value, pass.value);
    show("Login Success ✅");

    setTimeout(()=>{
      window.location.href = "home.html";
    },800);

  }catch(e){
    show(e.message);
  }
};

window.signup = async ()=>{
  try{
    await createUserWithEmailAndPassword(auth, email.value, pass.value);
    show("Account Created ✅");
  }catch(e){
    show(e.message);
  }
};
</script>

</body>
</html>
