<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wadi Soon App</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

/* BACKGROUND */
body{
  min-height:200vh;
  background:linear-gradient(135deg,#1f3c88,#3b5998);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* LOGIN CARD */
.card{
  width:350px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
}

/* BUTTONS */
button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.login{background:#2563eb}
.signup{background:#16a34a}

/* CHAT BUTTON */
.chat-toggle{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  border:none;
  font-size:26px;
  color:#fff;
  z-index:9999;
  cursor:pointer;
}

/* CHAT BOX */
.chat{
  position:fixed;
  bottom:100px;
  right:20px;
  width:330px;
  height:460px;
  display:none;
  flex-direction:column;
  border-radius:18px;
  overflow:hidden;
  background:rgba(15,23,42,0.9);
  backdrop-filter:blur(12px);
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

.chat.active{display:flex}

/* HEADER */
.chat-header{
  padding:12px;
  background:#020617;
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

/* CHAT AREA */
#chatBox{
  flex:1;
  overflow:auto;
  padding:10px;
}

/* MESSAGE */
.msg{
  margin:6px 0;
  padding:10px;
  border-radius:12px;
  font-size:14px;
}

.me{
  background:linear-gradient(135deg,#22c55e,#4ade80);
  color:#022c22;
}

.other{
  background:#1e293b;
  color:#e2e8f0;
}

/* INPUT AREA */
.input-area{
  padding:10px;
  background:#020617;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.input-area input,
.input-area textarea{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid #334155;
  background:#0f172a;
  color:#fff;
}

.input-area textarea{
  resize:none;
  height:50px;
}

/* SEND BUTTON */
.input-area button{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  padding:12px;
  border-radius:12px;
  font-weight:bold;
  transition:0.3s;
}

.input-area button:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="card">
  <h2>🌿 Wadi Soon</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="pass" placeholder="Password">

  <button class="login" onclick="login()">Login</button>
  <button class="signup" onclick="signup()">Signup</button>
</div>

<!-- CHAT BUTTON -->
<button class="chat-toggle" onclick="toggleChat()">💬</button>

<!-- CHAT BOX -->
<div class="chat" id="chat">
  <div class="chat-header">
    <span>Live Chat</span>
    <span onclick="toggleChat()" style="cursor:pointer;">✖</span>
  </div>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="name" placeholder="Your name">
    <textarea id="msg" placeholder="Type message..."></textarea>
    <button onclick="send()">🚀 Send Message</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDpERmy9jWQ5IS5GmyP54EZNdYDiKB-3RI",
  authDomain: "wadi-soon-site.firebaseapp.com",
  projectId: "wadi-soon-site"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ELEMENTS */
const msg = document.getElementById("msg");
const name = document.getElementById("name");
const chatBox = document.getElementById("chatBox");
const emailInput = document.getElementById("email");
const passInput = document.getElementById("pass");

/* LOGIN */
window.login = async ()=>{
  try{
    await signInWithEmailAndPassword(auth,emailInput.value,passInput.value);
    alert("Login Successful");
  }catch(e){
    alert("Login Failed");
  }
};

/* SIGNUP */
window.signup = async ()=>{
  try{
    await createUserWithEmailAndPassword(auth,emailInput.value,passInput.value);
    alert("Account Created");
  }catch(e){
    alert("Signup Failed");
  }
};

/* TOGGLE CHAT */
window.toggleChat = ()=>{
  document.getElementById("chat").classList.toggle("active");
};

/* USER */
let user = localStorage.getItem("u");
if(!user){
  user="u"+Math.random();
  localStorage.setItem("u",user);
}

/* SEND */
window.send = async ()=>{
  const text = msg.value.trim();
  if(!text) return;

  await addDoc(collection(db,"chat"),{
    text,
    user,
    name: name.value || "Guest",
    time:Date.now()
  });

  msg.value="";
};

/* ENTER SEND */
msg.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    e.preventDefault();
    send();
  }
});

/* LOAD MESSAGES */
onSnapshot(query(collection(db,"chat"), orderBy("time")), snap=>{
  chatBox.innerHTML="";

  snap.forEach(d=>{
    const m=d.data();

    const div=document.createElement("div");
    div.className="msg "+(m.user===user?"me":"other");

    div.innerHTML=`${m.name}<br>${m.text}`;

    chatBox.appendChild(div);
  });

  chatBox.scrollTop = chatBox.scrollHeight;
});

</script>

</body>
</html>
