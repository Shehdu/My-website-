<!DOCTYPE html>
<html>
<head>
  <title>Wadi Soon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg,#1e3c72,#2a5298);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      width: 300px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      margin: 5px;
      cursor: pointer;
      font-size: 15px;
    }

    .login { background: #00c6ff; color:white; }
    .signup { background: #28a745; color:white; }

  </style>
</head>

<body>

<div class="container">
  <h2>Wadi Soon 🌿</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <br>
  <button class="login" onclick="login()">Login</button>
  <button class="signup" onclick="signup()">Sign Up</button>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpERmy9jWQ5IS5GmyP54EZNdYDiKB-3RI",
  authDomain: "wadi-soon-site.firebaseapp.com",
  projectId: "wadi-soon-site",
  storageBucket: "wadi-soon-site.firebasestorage.app",
  messagingSenderId: "306902521128",
  appId: "1:306902521128:web:d9bfa631b4e5544696ec1d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// LOGIN
window.login = function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
  .then(() => {
    alert("Login Successful");
    window.location.href = "home.html"; // 🔥 redirect
  })
  .catch(e => alert(e.message));
}

// SIGNUP
window.signup = function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
  .then(() => {
    alert("Account Created");
  })
  .catch(e => alert(e.message));
}
</script>

</body>
</html>
