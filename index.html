<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wadi Soon App</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

/* BACKGROUND */
body{
  min-height:200vh;
  background:linear-gradient(135deg,#1f3c88,#3b5998);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* LOGIN CARD */
.card{
  width:350px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
}

button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.login{background:#2563eb}
.signup{background:#16a34a}

/* CHAT BUTTON */
.chat-toggle{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#00c6ff;
  border:none;
  font-size:25px;
  color:#fff;
  z-index:9999;
}

/* CHAT BOX */
.chat{
  position:fixed;
  bottom:100px;
  right:20px;
  width:320px;
  height:450px;
  display:none;
  flex-direction:column;
  background:#0f172a;
  border-radius:15px;
  overflow:hidden;
  z-index:9999;
}

.chat.active{display:flex}

.chat-header{
  padding:10px;
  background:#020617;
  display:flex;
  justify-content:space-between;
}

#chatBox{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg{
  margin:5px 0;
  padding:8px;
  border-radius:10px;
}

.me{background:#22c55e}
.other{background:#334155}

.input-area{
  padding:8px;
  background:#020617;
}

.input-area input,
.input-area textarea{
  width:100%;
  padding:6px;
  margin-top:5px;
  border-radius:8px;
  border:none;
}

</style>
</head>

<body>

<div class="card">
  <h2>Wadi Soon</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="pass" placeholder="Password">

  <button class="login" onclick="login()">Login</button>
  <button class="signup" onclick="signup()">Signup</button>
</div>

<!-- CHAT BUTTON -->
<button class="chat-toggle" onclick="toggleChat()">💬</button>

<!-- CHAT BOX -->
<div class="chat" id="chat">
  <div class="chat-header">
    <span>Chat</span>
    <span onclick="toggleChat()">✖</span>
  </div>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="name" placeholder="Name">
    <textarea id="msg" placeholder="Message"></textarea>
    <button onclick="send()">Send</button>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* 🔴 YOUR CONFIG (ALREADY CORRECT) */
const firebaseConfig = {
  apiKey: "AIzaSyDpERmy9jWQ5IS5GmyP54EZNdYDiKB-3RI",
  authDomain: "wadi-soon-site.firebaseapp.com",
  projectId: "wadi-soon-site"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOGIN */
window.login = async ()=>{
  const email = emailInput.value;
  const pass = passInput.value;

  try{
    await signInWithEmailAndPassword(auth,email,pass);
    alert("Login OK");
  }catch{
    alert("Login Failed");
  }
};

/* SIGNUP */
window.signup = async ()=>{
  const email = emailInput.value;
  const pass = passInput.value;

  try{
    await createUserWithEmailAndPassword(auth,email,pass);
    alert("Account Created");
  }catch{
    alert("Signup Failed");
  }
};

/* CHAT TOGGLE */
window.toggleChat = ()=>{
  document.getElementById("chat").classList.toggle("active");
};

/* USER */
let user = localStorage.getItem("u");
if(!user){
  user="u"+Math.random();
  localStorage.setItem("u",user);
}

/* SEND */
window.send = async ()=>{
  const text = msg.value.trim();
  if(!text) return;

  await addDoc(collection(db,"chat"),{
    text,
    user,
    name: name.value || "Guest",
    time:Date.now()
  });

  msg.value="";
};

/* LOAD */
onSnapshot(query(collection(db,"chat"), orderBy("time")), snap=>{
  chatBox.innerHTML="";
  snap.forEach(d=>{
    const m=d.data();
    const div=document.createElement("div");
    div.className="msg "+(m.user===user?"me":"other");
    div.innerHTML=`${m.name}<br>${m.text}`;
    chatBox.appendChild(div);
  });
});
</script>

</body>
</html>
