<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
  font-family:Arial;
  color:#fff;
}

.box{
  width:300px;
  padding:25px;
  background:#1e293b;
  border-radius:12px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  background:#22c55e;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>

  <p id="msg"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyDpERmy9jWQ5IS5GmyP54EZNdYDiKB-3RI",
  authDomain: "wadi-soon-site.firebaseapp.com",
  projectId: "wadi-soon-site"
});

const auth = getAuth(app);

function show(t){
  document.getElementById("msg").innerText = t;
}

window.login = async ()=>{
  try{
    await signInWithEmailAndPassword(
      auth,
      email.value,
      pass.value
    );

    show("Login Success");

    setTimeout(()=>{
      location.href="home.html";
    },1000);

  }catch(e){
    show("Error: "+e.message);
  }
};

window.signup = async ()=>{
  try{
    await createUserWithEmailAndPassword(
      auth,
      email.value,
      pass.value
    );

    show("Account Created");

  }catch(e){
    show("Error: "+e.message);
  }
};
</script>

</body>
</html>
