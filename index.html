<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Website</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #f5f5f5;
}

/* Header */
.header {
  background-color: #e8f5e9;
  text-align: center;
  padding: 15px;
}

.header h1 {
  color: #1b5e20;
  margin: 5px;
}

/* Layout */
.main {
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 25%;
  background-color: #cccccc;
  padding: 15px;
}

/* Content */
.content {
  width: 75%;
  padding: 15px;
}

/* Gallery */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
}

/* Card */
.card {
  background: white;
  padding: 10px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
}

/* Images */
img {
  width: 100%;
  border-radius: 10px;
}

/* Mobile Responsive */
@media (max-width: 600px) {
  .main {
    flex-direction: column;
  }

  .sidebar, .content {
    width: 100%;
  }
}
</style>

</head>

<body>

<div class="header">
  <h1>✨ Welcome to My Website 😎</h1>
  <p>My name is Shahid Iqbal</p>
</div>

<div class="main">

  <div class="sidebar">
    <p>🏠 Home</p>
    <p>⚙️ Settings</p>
    <p>Mera naam Shahid Iqbal hai.</p>
    <p>Main web development seekh raha hoon 🚀</p>
  </div>

  <div class="content">

    <div class="gallery">

      <div class="card">
        <img src="image1.jpg" alt="Image 1">
        <p>Image 1</p>
      </div>

      <div class="card">
        <img src="image2.jpg" alt="Image 2">
        <p>Image 2</p>
      </div>

      <div class="card">
        <img src="image3.jpg" alt="Image 3">
        <p>Image 3</p>
      </div>

    </div>

    <p style="text-align:center; margin-top:20px;">
      Mujhe websites banana pasand hai ❤️
    </p>

  </div>

</div>

</body>
</html>
