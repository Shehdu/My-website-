<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wadi Soon | Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", Arial, sans-serif;
}

body {
  min-height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  background:
    radial-gradient(circle at top left, #1ee3cf 0%, transparent 30%),
    radial-gradient(circle at bottom right, #4f46e5 0%, transparent 30%),
    linear-gradient(135deg, #071426, #0f2c4d, #123d64);
  color: white;
  position: relative;
}

/* Shapes */
.bg-shape {
  position: absolute;
  border-radius: 50%;
  filter: blur(40px);
  opacity: 0.35;
  animation: float 10s infinite ease-in-out;
  z-index: 0;
}

.shape1 { width: 220px; height: 220px; background: #00f5d4; top: 8%; left: 8%; }
.shape2 { width: 260px; height: 260px; background: #8b5cf6; bottom: 6%; right: 8%; animation-delay: 2s; }
.shape3 { width: 180px; height: 180px; background: #38bdf8; top: 65%; left: 18%; animation-delay: 4s; }

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-25px); }
}

.card {
  position: relative;
  z-index: 2;
  width: 380px;
  max-width: 92%;
  padding: 34px 28px;
  border-radius: 28px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(18px);
}

/* Branding */
.brand { text-align: center; margin-bottom: 24px; }
.logo {
  width: 70px; height: 70px;
  margin: auto;
  border-radius: 20px;
  display: grid;
  place-items: center;
  font-size: 30px;
  background: linear-gradient(135deg, #14f1d9, #4f46e5);
}
.brand h1 { font-size: 28px; font-weight: bold; }
.brand p { font-size: 14px; opacity: 0.8; margin-top: 6px; }

/* Inputs */
.input-group { margin-bottom: 15px; position: relative; }

input {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.15);
  color: white;
}

.toggle-password {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
}

/* Buttons */
.actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

button {
  padding: 13px;
  border: none;
  border-radius: 14px;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.login-btn { background: linear-gradient(135deg, #00d2ff, #2563eb); }
.signup-btn { background: linear-gradient(135deg, #22c55e, #15803d); }

/* Toast */
.toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
}

.toast {
  background: #111;
  padding: 12px 15px;
  margin-bottom: 10px;
  border-radius: 10px;
}

</style>
</head>

<body>

<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>
<div class="bg-shape shape3"></div>

<div class="card">
  <div class="brand">
    <div class="logo">🌿</div>
    <h1>Wadi Soon</h1>
    <p>Login or create account</p>
  </div>

  <div class="input-group">
    <input type="email" id="email" placeholder="Email">
  </div>

  <div class="input-group">
    <input type="password" id="password" placeholder="Password">
    <span class="toggle-password" onclick="togglePass()">👁️</span>
  </div>

  <div class="actions">
    <button class="login-btn" onclick="login()">Login</button>
    <button class="signup-btn" onclick="signup()">Sign Up</button>
  </div>
</div>

<div class="toast-container" id="toast"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyDpERmy9jWQ5IS5GmyP54EZNdYDiKB-3RI",
  authDomain: "wadi-soon-site.firebaseapp.com",
  projectId: "wadi-soon-site"
});

const auth = getAuth(app);

window.togglePass = () => {
  const p = document.getElementById("password");
  p.type = p.type === "password" ? "text" : "password";
};

function show(msg) {
  document.getElementById("toast").innerHTML = "<div class='toast'>" + msg + "</div>";
}

/* LOGIN */
window.login = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
    show("Login Successful");
    setTimeout(()=> location.href="home.html",1000);
  } catch(e) {
    show("Login Failed");
  }
};

/* SIGNUP */
window.signup = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  try {
    await createUserWithEmailAndPassword(auth, email, pass);
    show("Account Created");
  } catch(e) {
    show("Signup Failed");
  }
};

</script>

</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Chat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
}

/* Chat Box */
.chat-container {
  position: fixed;
  bottom: 0;
  right: 0;
  width: 100%;
  max-width: 400px;
  height: 500px;
  background: #f1f5f9;
  display: flex;
  flex-direction: column;
  border-radius: 15px 15px 0 0;
}

/* Header */
.chat-header {
  background: #0ea5e9;
  color: white;
  padding: 12px;
  font-weight: bold;
}

/* Messages */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

/* Message bubble */
.message {
  max-width: 70%;
  padding: 8px;
  margin: 5px;
  border-radius: 10px;
  font-size: 14px;
}

.me {
  background: #0ea5e9;
  color: white;
  margin-left: auto;
}

.other {
  background: #e2e8f0;
  color: black;
}

/* Time */
.time {
  font-size: 10px;
  opacity: 0.6;
}

/* Input */
.chat-input {
  display: flex;
  padding: 10px;
  background: white;
}

.chat-input input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  color: black;
}

.chat-input button {
  margin-left: 5px;
  padding: 10px;
  background: #0ea5e9;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="chat-container">
  <div class="chat-header">Live Chat</div>

  <div id="messages" class="chat-messages"></div>

  <div class="chat-input">
    <input id="msg" placeholder="Type message...">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 YOUR CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDpERmy9jWQ5IS5GmyP54EZNdYDiKB-3RI",
  authDomain: "wadi-soon-site.firebaseapp.com",
  projectId: "wadi-soon-site"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

/* 🔥 ADMIN UID */
const ADMIN_UID = "3zfYxvDKyxV4RgD8SLeybDrhdto2";

/* LOGIN */
signInAnonymously(auth);

/* USER READY */
onAuthStateChanged(auth, (user) => {
  if (!user) return;

  const uid = user.uid;
  console.log("USER:", uid);

  loadMessages(uid);
});

/* SEND MESSAGE */
window.sendMsg = async function () {
  const input = document.getElementById("msg");
  const text = input.value.trim();

  if (!text) return;

  const user = auth.currentUser;

  await addDoc(collection(db, "messages"), {
    text: text,
    uid: user.uid,
    time: Date.now()
  });

  input.value = "";
};

/* LOAD MESSAGES */
function loadMessages(uid) {

  const q = query(collection(db, "messages"), orderBy("time"));

  onSnapshot(q, (snapshot) => {

    const box = document.getElementById("messages");
    box.innerHTML = "";

    snapshot.forEach(docSnap => {

      const data = docSnap.data();
      const id = docSnap.id;

      const div = document.createElement("div");
      div.classList.add("message");

      if (data.uid === uid) {
        div.classList.add("me");
      } else {
        div.classList.add("other");
      }

      const time = new Date(data.time).toLocaleTimeString();

      div.innerHTML = `
        ${data.text}
        <div class="time">${time}</div>
      `;

      /* DELETE (ADMIN OR OWNER) */
      if (uid === data.uid || uid === ADMIN_UID) {
        div.onclick = async () => {
          if (confirm("Delete message?")) {
            await deleteDoc(doc(db, "messages", id));
          }
        };
      }

      box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
  });
}

</script>

</body>
</html>
