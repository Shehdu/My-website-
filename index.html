<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wadi Soon | Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", Arial, sans-serif;
}

body {
  min-height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  background:
    radial-gradient(circle at top left, #1ee3cf 0%, transparent 30%),
    radial-gradient(circle at bottom right, #4f46e5 0%, transparent 30%),
    linear-gradient(135deg, #071426, #0f2c4d, #123d64);
  color: white;
  position: relative;
}

/* Shapes */
.bg-shape {
  position: absolute;
  border-radius: 50%;
  filter: blur(40px);
  opacity: 0.35;
  animation: float 10s infinite ease-in-out;
  z-index: 0;
}

.shape1 { width: 220px; height: 220px; background: #00f5d4; top: 8%; left: 8%; }
.shape2 { width: 260px; height: 260px; background: #8b5cf6; bottom: 6%; right: 8%; animation-delay: 2s; }
.shape3 { width: 180px; height: 180px; background: #38bdf8; top: 65%; left: 18%; animation-delay: 4s; }

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-25px); }
}

.card {
  position: relative;
  z-index: 2;
  width: 380px;
  max-width: 92%;
  padding: 34px 28px;
  border-radius: 28px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(18px);
}

/* Branding */
.brand { text-align: center; margin-bottom: 24px; }
.logo {
  width: 70px; height: 70px;
  margin: auto;
  border-radius: 20px;
  display: grid;
  place-items: center;
  font-size: 30px;
  background: linear-gradient(135deg, #14f1d9, #4f46e5);
}
.brand h1 { font-size: 28px; font-weight: bold; }
.brand p { font-size: 14px; opacity: 0.8; margin-top: 6px; }

/* Inputs */
.input-group { margin-bottom: 15px; position: relative; }

input {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.15);
  color: white;
}

.toggle-password {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
}

/* Buttons */
.actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

button {
  padding: 13px;
  border: none;
  border-radius: 14px;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.login-btn { background: linear-gradient(135deg, #00d2ff, #2563eb); }
.signup-btn { background: linear-gradient(135deg, #22c55e, #15803d); }

/* Toast */
.toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
}

.toast {
  background: #111;
  padding: 12px 15px;
  margin-bottom: 10px;
  border-radius: 10px;
}

</style>
</head>

<body>

<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>
<div class="bg-shape shape3"></div>

<div class="card">
  <div class="brand">
    <div class="logo">🌿</div>
    <h1>Wadi Soon</h1>
    <p>Login or create account</p>
  </div>

  <div class="input-group">
    <input type="email" id="email" placeholder="Email">
  </div>

  <div class="input-group">
    <input type="password" id="password" placeholder="Password">
    <span class="toggle-password" onclick="togglePass()">👁️</span>
  </div>

  <div class="actions">
    <button class="login-btn" onclick="login()">Login</button>
    <button class="signup-btn" onclick="signup()">Sign Up</button>
  </div>
</div>

<div class="toast-container" id="toast"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyDpERmy9jWQ5IS5GmyP54EZNdYDiKB-3RI",
  authDomain: "wadi-soon-site.firebaseapp.com",
  projectId: "wadi-soon-site"
});

const auth = getAuth(app);

window.togglePass = () => {
  const p = document.getElementById("password");
  p.type = p.type === "password" ? "text" : "password";
};

function show(msg) {
  document.getElementById("toast").innerHTML = "<div class='toast'>" + msg + "</div>";
}

/* LOGIN */
window.login = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
    show("Login Successful");
    setTimeout(()=> location.href="home.html",1000);
  } catch(e) {
    show("Login Failed");
  }
};

/* SIGNUP */
window.signup = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  try {
    await createUserWithEmailAndPassword(auth, email, pass);
    show("Account Created");
  } catch(e) {
    show("Signup Failed");
  }
};

</script>
  </body>
</html>
