<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wadi Soon | Login</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#071426,#0f2c4d,#123d64);
color:white;
}

/* LOGIN CARD */
.card{
width:350px;
padding:25px;
border-radius:20px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

/* 💬 CHAT BUTTON */
#chatToggle{
position:fixed;
bottom:20px;
right:20px;
background:#2563eb;
padding:14px;
border-radius:50%;
cursor:pointer;
z-index:9999;
}

/* 💬 CHAT BOX */
#chatContainer{
position:fixed;
bottom:80px;
right:20px;
width:300px;
height:400px;
background:#0f172a;
border-radius:12px;
display:none;
flex-direction:column;
overflow:hidden;
z-index:9999;
}

#chatHeader{
background:#1e293b;
padding:10px;
text-align:center;
cursor:pointer;
}

#chatBox{
flex:1;
overflow:auto;
padding:10px;
}

.me{text-align:right;color:#38bdf8;margin:5px}
.admin{text-align:left;color:#4ade80;margin:5px}

#chatInput{display:flex}
#chatInput input{flex:1;padding:8px;border:none}
#chatInput button{padding:8px;background:#22c55e;border:none;color:white}
</style>
</head>

<body>

<div class="card">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="signup()">Sign Up</button>
</div>

<!-- 💬 CHAT UI -->
<div id="chatToggle" onclick="toggleChat()">💬</div>

<div id="chatContainer">
<div id="chatHeader" onclick="toggleChat()">Support</div>
<div id="chatBox"></div>

<div id="chatInput">
<input id="msg" placeholder="Type...">
<button onclick="sendMsg()">➤</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
databaseURL: "YOUR_DB_URL"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// LOGIN
window.login = async ()=>{
let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;
await signInWithEmailAndPassword(auth,email,pass);
alert("Login Success");
};

// SIGNUP
window.signup = async ()=>{
let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;
await createUserWithEmailAndPassword(auth,email,pass);
alert("Account Created");
};

// CHAT SYSTEM
const adminId="admin_123";

let myId=localStorage.getItem("uid");
if(!myId){
myId="user_"+Math.random().toString(36).substr(2,9);
localStorage.setItem("uid",myId);
}

function room(){
return myId+"_"+adminId;
}

window.sendMsg=()=>{
let msg=document.getElementById("msg").value;
if(!msg)return;

push(ref(db,"chats/"+room()),{
sender:myId,
text:msg
});

document.getElementById("msg").value="";
};

onChildAdded(ref(db,"chats/"+room()),snap=>{
let d=snap.val();
let div=document.createElement("div");

if(d.sender===myId){
div.className="me";
div.innerText=d.text;
}else{
div.className="admin";
div.innerText="Admin: "+d.text;
}

chatBox.appendChild(div);
chatBox.scrollTop=chatBox.scrollHeight;
});

// TOGGLE
window.toggleChat=()=>{
let box=document.getElementById("chatContainer");
box.style.display=(box.style.display==="flex")?"none":"flex";
};
</script>

</body>
</html>
