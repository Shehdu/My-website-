<!-- CHAT TOGGLE BUTTON -->
<button class="chat-toggle" onclick="toggleChat()">💬</button>

<!-- CHAT BOX -->
<div class="chat-container" id="chatContainer">
  <div class="chat-header">
    💬 Live Chat
    <span onclick="toggleChat()" class="close-btn">✖</span>
  </div>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="nameInput" placeholder="Your name..." />
    <textarea id="messageInput" placeholder="Type message..."></textarea>
    <button id="sendBtn">Send</button>
  </div>
</div>

<style>
.chat-toggle{
  position:fixed;
  bottom:20px;
  right:15px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#10b981;
  color:#fff;
  font-size:22px;
  border:none;
  z-index:9999;
}

.chat-container{
  position:fixed;
  bottom:90px;
  right:15px;
  width:330px;
  height:440px;
  background:#ece5dd;
  border-radius:18px;
  display:none;
  flex-direction:column;
  overflow:hidden;
  z-index:9999;
}

.chat-container.active{
  display:flex;
}

.chat-header{
  background:#075e54;
  color:#fff;
  padding:12px;
  display:flex;
  justify-content:space-between;
}

.close-btn{
  cursor:pointer;
}

#chatBox{
  flex:1;
  overflow:auto;
  padding:10px;
}

.message{
  max-width:75%;
  padding:8px;
  margin:6px 0;
  border-radius:12px;
  font-size:13px;
}

.myMsg{
  background:#dcf8c6;
  margin-left:auto;
}

.otherMsg{
  background:#fff;
}

.msg-name{
  font-weight:bold;
  font-size:11px;
}

.msg-time{
  font-size:10px;
  opacity:.6;
  text-align:right;
}

.deleteBtn{
  font-size:12px;
  color:red;
  cursor:pointer;
}

.input-area{
  display:flex;
  flex-direction:column;
  gap:5px;
  padding:8px;
  background:#f1f1f1;
}

.input-area input,
.input-area textarea{
  border-radius:10px;
  border:1px solid #ccc;
  padding:8px;
}

.input-area button{
  background:#075e54;
  color:#fff;
  border:none;
  padding:8px;
  border-radius:10px;
}

/* MOBILE */
@media(max-width:600px){
  .chat-container{
    width:95%;
    right:2.5%;
  }
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpER...",
  authDomain: "wadi-soon-site.firebaseapp.com",
  projectId: "wadi-soon-site"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// USER ID
let userId = localStorage.getItem("chatUserId");
if(!userId){
  userId = "user_" + Math.random().toString(36).slice(2,6);
  localStorage.setItem("chatUserId", userId);
}

// NAME SAVE
let userName = localStorage.getItem("chatName") || "";

const chatBox = document.getElementById("chatBox");
const input = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");
const nameInput = document.getElementById("nameInput");

nameInput.value = userName;

// TOGGLE
window.toggleChat = function(){
  document.getElementById("chatContainer").classList.toggle("active");
}

// SEND
sendBtn.onclick = async () => {
  const msg = input.value.trim();
  const name = nameInput.value.trim() || "Guest";

  if(!msg) return;

  localStorage.setItem("chatName", name);

  await addDoc(collection(db,"messages"),{
    text:msg,
    user:userId,
    name:name,
    time:Date.now()
  });

  input.value="";
};

// LOAD
const q = query(collection(db,"messages"), orderBy("time"));

onSnapshot(q,(snap)=>{
  chatBox.innerHTML="";

  snap.forEach(d=>{
    const data = d.data();

    const div = document.createElement("div");
    div.className = "message " + (data.user===userId?"myMsg":"otherMsg");

    div.innerHTML = `
      <div class="msg-name">${data.name}</div>
      ${data.text}
      <div class="msg-time">${new Date(data.time).toLocaleTimeString()}</div>
    `;

    if(data.user===userId){
      const del = document.createElement("span");
      del.textContent=" ❌";
      del.className="deleteBtn";

      del.onclick = ()=> deleteDoc(doc(db,"messages",d.id));
      div.appendChild(del);
    }

    chatBox.appendChild(div);
  });

  chatBox.scrollTop = chatBox.scrollHeight;
});
</script>
