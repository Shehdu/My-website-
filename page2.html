<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Chat</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  padding:20px;
}

.chat-box{
  max-width:600px;
  margin:auto;
  background:#1e293b;
  padding:15px;
  border-radius:12px;
}

#messages{
  height:300px;
  overflow:auto;
  background:#111827;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.msg{
  margin:6px 0;
  padding:8px;
  border-radius:8px;
}

.me{ background:#22c55e; text-align:right; }
.other{ background:#374151; }

input,button{
  padding:10px;
  border:none;
  border-radius:8px;
  margin:5px 0;
}

button{
  background:#22c55e;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>🔐 Private Chat</h2>

<!-- LOGIN -->
<div id="loginBox">
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- CHAT -->
<div id="chatUI" style="display:none;">
  <p>Your UID: <span id="myid"></span></p>

  <input id="otherId" placeholder="Enter other user UID"><br>
  <button onclick="startChat()">Start Chat</button>

  <div class="chat-box">
    <div id="messages"></div>

    <input id="msgInput" placeholder="Type message">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "wadi-soon-site.firebaseapp.com",
  projectId: "wadi-soon-site"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let user, chatId;

// LOGIN
window.login = async ()=>{
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  const res = await signInWithEmailAndPassword(auth,email,pass);
  user = res.user;

  document.getElementById("loginBox").style.display="none";
  document.getElementById("chatUI").style.display="block";
  document.getElementById("myid").innerText = user.uid;

  // save user
  await setDoc(doc(db,"users",user.uid),{
    email:user.email
  });
};

// CHAT ID GENERATE
function makeId(a,b){
  return a<b ? a+"_"+b : b+"_"+a;
}

// START CHAT
window.startChat = ()=>{
  const other = document.getElementById("otherId").value;
  chatId = makeId(user.uid,other);

  loadMessages();
};

// SEND
window.sendMsg = async ()=>{
  const text = document.getElementById("msgInput").value;

  await setDoc(doc(db,"chats",chatId),{
    users:[user.uid, document.getElementById("otherId").value]
  });

  await addDoc(collection(db,"chats",chatId,"messages"),{
    text:text,
    sender:user.uid,
    time:Date.now()
  });

  document.getElementById("msgInput").value="";
};

// LOAD
function loadMessages(){
  const q = query(collection(db,"chats",chatId,"messages"), orderBy("time"));

  onSnapshot(q,(snap)=>{
    const box = document.getElementById("messages");
    box.innerHTML="";

    snap.forEach(d=>{
      const data = d.data();

      const div = document.createElement("div");
      div.className = "msg " + (data.sender===user.uid ? "me":"other");
      div.innerText = data.text;

      box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
  });
}

// AUTO LOGIN CHECK
onAuthStateChanged(auth,(u)=>{
  if(u){
    user=u;
    document.getElementById("loginBox").style.display="none";
    document.getElementById("chatUI").style.display="block";
    document.getElementById("myid").innerText = user.uid;
  }
});
</script>

</body>
</html>
