<!-- CHAT BUTTON -->
<button class="chat-toggle" onclick="toggleChat()">💬</button>

<!-- CHAT BOX -->
<div class="chat-container" id="chat">
  <div class="chat-header">
    🌍 Public Chat
    <span onclick="toggleChat()">✖</span>
  </div>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="name" placeholder="Your name">
    <textarea id="msg" placeholder="Type message..."></textarea>
    <button onclick="send()">Send</button>
  </div>
</div>

<style>
.chat-toggle{
  position:fixed;
  bottom:20px;
  right:15px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color:#fff;
  border:none;
  font-size:22px;
  z-index:9999;
}

.chat-container{
  position:fixed;
  bottom:90px;
  right:15px;
  width:340px;
  height:480px;
  background:#0f172a;
  border-radius:18px;
  display:none;
  flex-direction:column;
  overflow:hidden;
  z-index:9999;
}

.chat-container.active{ display:flex; }

.chat-header{
  background:#020617;
  color:#fff;
  padding:12px;
  display:flex;
  justify-content:space-between;
}

#chatBox{
  flex:1;
  overflow:auto;
  padding:10px;
}

.message{
  margin:6px 0;
  padding:10px;
  border-radius:12px;
  font-size:13px;
}

.me{ background:#22c55e; text-align:right; }
.other{ background:#1e293b; }

.name{
  font-size:11px;
  opacity:.7;
}

.time{
  font-size:10px;
  opacity:.6;
}

.delete{
  color:red;
  cursor:pointer;
  font-size:12px;
}

.input-area{
  padding:8px;
  background:#020617;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.input-area input,
.input-area textarea{
  border:none;
  border-radius:10px;
  padding:8px;
}

.input-area button{
  background:#22c55e;
  color:#fff;
  border:none;
  padding:8px;
  border-radius:10px;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "wadi-soon-site.firebaseapp.com",
  projectId: "wadi-soon-site"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let user = localStorage.getItem("userId");
if(!user){
  user = "u_"+Math.random().toString(36).slice(2,6);
  localStorage.setItem("userId",user);
}

const box = document.getElementById("chatBox");

window.toggleChat = ()=>{
  document.getElementById("chat").classList.toggle("active");
}

window.send = async ()=>{
  const name = document.getElementById("name").value || "Guest";
  const text = document.getElementById("msg").value;

  if(!text) return;

  await addDoc(collection(db,"publicChat"),{
    name:name,
    text:text,
    user:user,
    time:Date.now()
  });

  document.getElementById("msg").value="";
}

const q = query(collection(db,"publicChat"), orderBy("time"));

onSnapshot(q,(snap)=>{
  box.innerHTML="";

  snap.forEach(d=>{
    const data = d.data();

    const div = document.createElement("div");
    div.className = "message " + (data.user===user?"me":"other");

    div.innerHTML = `
      <div class="name">${data.name}</div>
      ${data.text}
      <div class="time">${new Date(data.time).toLocaleTimeString()}</div>
    `;

    if(data.user===user){
      const del = document.createElement("span");
      del.innerText=" ❌";
      del.className="delete";
      del.onclick=()=>deleteDoc(doc(db,"publicChat",d.id));
      div.appendChild(del);
    }

    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
});
</script>
