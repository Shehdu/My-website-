<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wadi Soon Support Panel</title>

  <style>
    :root {
      --bg: #0f172a;
      --panel: #ffffff;
      --line: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #0f766e;
      --primary2: #14b8a6;
      --danger: #b91c1c;
      --dangerBg: #fee2e2;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
    }

    .topbar {
      max-width: 1400px;
      margin: 0 auto 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .topbar h1 {
      font-size: 28px;
    }

    .topbar-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .badge {
      background: rgba(255,255,255,0.12);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
    }

    .btn {
      border: none;
      cursor: pointer;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
    }

    .btn.secondary {
      background: rgba(255,255,255,0.15);
    }

    .layout {
      max-width: 1400px;
      margin: auto;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      min-height: 78vh;
    }

    .sidebar,
    .chat-panel {
      background: var(--panel);
      color: var(--text);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }

    .sidebar-header,
    .chat-header {
      padding: 18px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
    }

    .sidebar-header h2,
    .chat-header h2 {
      font-size: 18px;
      margin-bottom: 4px;
    }

    .sidebar-header p,
    .chat-header p {
      font-size: 13px;
      color: var(--muted);
    }

    .conversation-list {
      height: calc(78vh - 80px);
      overflow-y: auto;
    }

    .conversation-item {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      transition: 0.2s;
    }

    .conversation-item:hover,
    .conversation-item.active {
      background: #ecfeff;
    }

    .conversation-item h3 {
      font-size: 15px;
      margin-bottom: 6px;
    }

    .conversation-item .email {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .conversation-item .last-msg {
      font-size: 12px;
      color: #334155;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-panel {
      display: flex;
      flex-direction: column;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      background:
        radial-gradient(circle at top left, rgba(20, 184, 166, 0.08), transparent 22%),
        #f8fafc;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      margin-top: 60px;
      font-size: 14px;
    }

    .msg {
      max-width: 76%;
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
      font-size: 13px;
      line-height: 1.5;
    }

    .mine {
      margin-left: auto;
      background: linear-gradient(135deg, var(--primary2), var(--primary));
      color: #fff;
      border-bottom-right-radius: 6px;
    }

    .other {
      margin-right: auto;
      background: #fff;
      color: #0f172a;
      border: 1px solid var(--line);
      border-bottom-left-radius: 6px;
    }

    .sender {
      font-size: 11px;
      font-weight: bold;
      margin-bottom: 5px;
      opacity: 0.85;
    }

    .meta {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .other .meta {
      justify-content: flex-start;
    }

    .time {
      font-size: 10px;
      opacity: 0.8;
    }

    .deleteBtn {
      border: none;
      padding: 4px 8px;
      border-radius: 10px;
      font-size: 10px;
      cursor: pointer;
      background: rgba(255,255,255,0.18);
      color: #fff;
    }

    .other .deleteBtn {
      background: var(--dangerBg);
      color: var(--danger);
    }

    .chat-input {
      border-top: 1px solid var(--line);
      padding: 14px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: #fff;
    }

    .chat-input textarea {
      flex: 1;
      min-height: 50px;
      max-height: 110px;
      resize: none;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      padding: 12px 14px;
      outline: none;
      font-size: 13px;
    }

    .chat-input textarea:focus {
      border-color: var(--primary2);
      box-shadow: 0 0 0 4px rgba(20,184,166,0.12);
    }

    .chat-input button {
      border: none;
      min-width: 90px;
      height: 50px;
      border-radius: 14px;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .conversation-list {
        height: 280px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Wadi Soon Support Panel</h1>
    <div class="topbar-actions">
      <div id="adminBadge" class="badge">Not logged in</div>
      <button id="loginBtn" class="btn">Login with Google</button>
      <button id="logoutBtn" class="btn secondary">Logout</button>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>Private Conversations</h2>
        <p>Yahan sab users ki alag private chats nazar aayengi.</p>
      </div>
      <div id="conversationList" class="conversation-list">
        <div class="empty">Login kar ke conversations dekhein.</div>
      </div>
    </div>

    <div class="chat-panel">
      <div class="chat-header">
        <h2 id="chatTitle">No chat selected</h2>
        <p id="chatSubTitle">User select karein taake private messages khul saken.</p>
      </div>

      <div id="chatBox" class="chat-box">
        <div class="empty">Abhi koi chat select nahi hui.</div>
      </div>

      <div class="chat-input">
        <textarea id="messageInput" placeholder="Type reply..." disabled></textarea>
        <button id="sendBtn" disabled>Send</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
    import {
      getFirestore,
      collection,
      query,
      where,
      onSnapshot,
      orderBy,
      addDoc,
      deleteDoc,
      doc,
      setDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDpERmy9jWQ5IS5GmyP54EZNdYDiKB-3RI",
      authDomain: "wadi-soon-site.firebaseapp.com",
      projectId: "wadi-soon-site",
      storageBucket: "wadi-soon-site.firebasestorage.app",
      messagingSenderId: "306902521128",
      appId: "1:306902521128:web:d9bfa631b4e5544696ec1d",
      measurementId: "G-V81LVNRLQH"
    };

    const SUPPORT_UID = "3zfYxvDKyxV4RgD8SLeybDrhdto2";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let currentChatId = null;
    let unsubscribeMessages = null;
    let unsubscribeConversations = null;

    const adminBadge = document.getElementById("adminBadge");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const conversationList = document.getElementById("conversationList");
    const chatBox = document.getElementById("chatBox");
    const chatTitle = document.getElementById("chatTitle");
    const chatSubTitle = document.getElementById("chatSubTitle");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");

    let selectedCustomer = null;

    function enableReply() {
      messageInput.disabled = false;
      sendBtn.disabled = false;
    }

    function disableReply() {
      messageInput.disabled = true;
      sendBtn.disabled = true;
    }

    function formatTime(ts) {
      try {
        if (ts && ts.toDate) {
          return ts.toDate().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        }
      } catch (e) {}
      return "";
    }

    async function loginWithGoogle() {
      try {
        const result = await signInWithPopup(auth, provider);
        currentUser = result.user;
      } catch (error) {
        console.error("Admin login error:", error);
        alert("Login fail ho gaya.");
      }
    }

    function renderConversations(items) {
      conversationList.innerHTML = "";

      if (!items.length) {
        conversationList.innerHTML = '<div class="empty">Abhi koi private conversation nahi hai.</div>';
        return;
      }

      items.forEach((item) => {
        const div = document.createElement("div");
        div.className = "conversation-item" + (item.id === currentChatId ? " active" : "");

        const customerName = item.customer?.name || "User";
        const customerEmail = item.customer?.email || "No email";

        div.innerHTML = `
          <h3>${customerName}</h3>
          <div class="email">${customerEmail}</div>
          <div class="last-msg">${item.lastMessage || "No message yet"}</div>
        `;

        div.addEventListener("click", () => {
          currentChatId = item.id;
          selectedCustomer = item.customer || null;
          chatTitle.textContent = customerName;
          chatSubTitle.textContent = customerEmail;
          enableReply();
          listenMessages(item.id);
          renderConversations(items);
        });

        conversationList.appendChild(div);
      });
    }

    function listenConversations() {
      if (unsubscribeConversations) {
        unsubscribeConversations();
        unsubscribeConversations = null;
      }

      const q = query(
        collection(db, "conversations"),
        where("members", "array-contains", SUPPORT_UID)
      );

      unsubscribeConversations = onSnapshot(q, (snapshot) => {
        const items = [];

        snapshot.forEach((docSnap) => {
          const data = docSnap.data();
          items.push({
            id: docSnap.id,
            ...data
          });
        });

        items.sort((a, b) => {
          const aTime = a.updatedAt?.toMillis ? a.updatedAt.toMillis() : 0;
          const bTime = b.updatedAt?.toMillis ? b.updatedAt.toMillis() : 0;
          return bTime - aTime;
        });

        renderConversations(items);
      }, (error) => {
        console.error("Conversation load error:", error);
        conversationList.innerHTML = '<div class="empty">Conversations load nahi hui.</div>';
      });
    }

    function listenMessages(chatId) {
      if (unsubscribeMessages) {
        unsubscribeMessages();
        unsubscribeMessages = null;
      }

      const q = query(
        collection(db, "conversations", chatId, "messages"),
        orderBy("createdAt", "asc")
      );

      unsubscribeMessages = onSnapshot(q, (snapshot) => {
        chatBox.innerHTML = "";

        if (snapshot.empty) {
          chatBox.innerHTML = '<div class="empty">Abhi koi message nahi.</div>';
          return;
        }

        snapshot.forEach((docSnap) => {
          const data = docSnap.data();
          const isMine = data.senderUid === currentUser.uid;

          const div = document.createElement("div");
          div.className = "msg " + (isMine ? "mine" : "other");

          const sender = document.createElement("div");
          sender.className = "sender";
          sender.textContent = isMine ? "You" : (data.senderName || data.senderEmail || "User");
          div.appendChild(sender);

          const text = document.createElement("div");
          text.textContent = data.text || "";
          div.appendChild(text);

          const meta = document.createElement("div");
          meta.className = "meta";

          const time = document.createElement("span");
          time.className = "time";
          time.textContent = formatTime(data.createdAt);
          meta.appendChild(time);

          if (isMine) {
            const delBtn = document.createElement("button");
            delBtn.className = "deleteBtn";
            delBtn.textContent = "Delete";

            delBtn.addEventListener("click", async () => {
              try {
                await deleteDoc(doc(db, "conversations", chatId, "messages", docSnap.id));
              } catch (error) {
                console.error("Delete message error:", error);
              }
            });

            meta.appendChild(delBtn);
          }

          div.appendChild(meta);
          chatBox.appendChild(div);
        });

        chatBox.scrollTop = chatBox.scrollHeight;
      }, (error) => {
        console.error("Messages error:", error);
        chatBox.innerHTML = '<div class="empty">Messages load nahi hue.</div>';
      });
    }

    async function sendReply() {
      const msg = messageInput.value.trim();
      if (!msg || !currentChatId || !currentUser) return;

      try {
        await addDoc(collection(db, "conversations", currentChatId, "messages"), {
          text: msg,
          senderUid: currentUser.uid,
          senderName: currentUser.displayName || "Support",
          senderEmail: currentUser.email || "",
          createdAt: serverTimestamp()
        });

        await setDoc(doc(db, "conversations", currentChatId), {
          updatedAt: serverTimestamp(),
          lastMessage: msg,
          lastMessageTime: serverTimestamp(),
          lastSenderUid: currentUser.uid
        }, { merge: true });

        messageInput.value = "";
        messageInput.style.height = "50px";
      } catch (error) {
        console.error("Reply error:", error);
        alert("Reply send nahi hui.");
      }
    }

    loginBtn.addEventListener("click", loginWithGoogle);

    logoutBtn.addEventListener("click", async () => {
      try {
        await signOut(auth);
      } catch (error) {
        console.error("Logout error:", error);
      }
    });

    sendBtn.addEventListener("click", sendReply);

    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendReply();
      }
    });

    messageInput.addEventListener("input", function () {
      this.style.height = "50px";
      this.style.height = Math.min(this.scrollHeight, 110) + "px";
    });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        adminBadge.textContent = user.displayName || user.email || "Logged in";

        if (user.uid !== SUPPORT_UID) {
          conversationList.innerHTML = '<div class="empty">Access denied. Yeh support account nahi hai.</div>';
          chatBox.innerHTML = '<div class="empty">Sahi support Gmail se login karein.</div>';
          chatTitle.textContent = "Access denied";
          chatSubTitle.textContent = "Aapka UID support UID se match nahi karta.";
          disableReply();
          return;
        }

        listenConversations();
      } else {
        currentUser = null;
        currentChatId = null;
        selectedCustomer = null;
        adminBadge.textContent = "Not logged in";
        conversationList.innerHTML = '<div class="empty">Login kar ke conversations dekhein.</div>';
        chatBox.innerHTML = '<div class="empty">Abhi koi chat select nahi hui.</div>';
        chatTitle.textContent = "No chat selected";
        chatSubTitle.textContent = "User select karein taake private messages khul saken.";
        disableReply();

        if (unsubscribeMessages) {
          unsubscribeMessages();
          unsubscribeMessages = null;
        }

        if (unsubscribeConversations) {
          unsubscribeConversations();
          unsubscribeConversations = null;
        }
      }
    });
  </script>
</body>
</html>
