<!-- ================= CHAT BUTTON ================= -->
<button class="chat-toggle" onclick="toggleChat()">💬</button>

<!-- ================= CHAT BOX ================= -->
<div class="chat-container" id="chat">

  <div class="chat-header">
    <span>🌍 Live Chat</span>
    <span onclick="toggleChat()">✖</span>
  </div>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="name" placeholder="Your name...">
    <textarea id="msg" placeholder="Type message..."></textarea>
    <button onclick="send()">Send</button>
  </div>

</div>

<!-- ================= STYLE ================= -->
<style>

body{
  overflow:auto !important;
}

/* FLOAT BUTTON */
.chat-toggle{
  position:fixed;
  bottom:25px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color:#fff;
  font-size:26px;
  border:none;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  z-index:9999;
}

/* CHAT BOX */
.chat-container{
  position:fixed;
  bottom:110px;
  right:20px;
  width:330px;
  height:450px;
  display:none;
  flex-direction:column;
  border-radius:20px;
  overflow:hidden;

  /* GLASS EFFECT */
  background:rgba(15,23,42,0.75);
  backdrop-filter:blur(15px);

  box-shadow:0 20px 50px rgba(0,0,0,0.5);
  z-index:9999;

  transform:scale(0.8);
  opacity:0;
  transition:0.3s;
}

.chat-container.active{
  display:flex;
  transform:scale(1);
  opacity:1;
}

/* HEADER */
.chat-header{
  padding:12px;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#fff;
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

/* CHAT AREA */
#chatBox{
  flex:1;
  overflow:auto;
  padding:10px;
}

/* MESSAGE */
.message{
  margin:8px 0;
  padding:10px;
  border-radius:12px;
  font-size:13px;
  animation:fadeIn .3s ease;
}

.me{
  background:#22c55e;
  text-align:right;
  color:#fff;
}

.other{
  background:#1e293b;
  color:#fff;
}

/* NAME */
.name{
  font-size:11px;
  opacity:.7;
}

/* TIME */
.time{
  font-size:10px;
  opacity:.6;
  margin-top:4px;
}

/* DELETE */
.delete{
  color:#ff4d4d;
  cursor:pointer;
  font-size:12px;
  margin-left:6px;
}

/* INPUT */
.input-area{
  padding:8px;
  background:#020617;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.input-area input,
.input-area textarea{
  border:none;
  border-radius:10px;
  padding:8px;
  font-size:13px;
}

.input-area textarea{
  resize:none;
  height:45px;
}

.input-area button{
  background:#22c55e;
  color:#fff;
  border:none;
  padding:8px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

/* ANIMATION */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* MOBILE */
@media(max-width:600px){
  .chat-container{
    width:90%;
    right:5%;
    height:60vh;
  }

  .chat-toggle{
    width:65px;
    height:65px;
  }
}

</style>

<!-- ================= SCRIPT ================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "wadi-soon-site.firebaseapp.com",
  projectId: "wadi-soon-site"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* USER ID */
let user = localStorage.getItem("chatUser");
if(!user){
  user = "user_"+Math.random().toString(36).slice(2,6);
  localStorage.setItem("chatUser",user);
}

/* SAVE NAME */
const nameInput = document.getElementById("name");
nameInput.value = localStorage.getItem("chatName") || "";

nameInput.addEventListener("input",()=>{
  localStorage.setItem("chatName",nameInput.value);
});

/* TOGGLE */
window.toggleChat = ()=>{
  document.getElementById("chat").classList.toggle("active");
}

/* SEND */
window.send = async ()=>{
  const name = nameInput.value || "Guest";
  const text = document.getElementById("msg").value.trim();

  if(!text) return;

  await addDoc(collection(db,"publicChat"),{
    name,
    text,
    user,
    time:Date.now()
  });

  document.getElementById("msg").value="";
}

/* LOAD */
const box = document.getElementById("chatBox");

const q = query(collection(db,"publicChat"), orderBy("time"));

onSnapshot(q,(snap)=>{
  box.innerHTML="";

  snap.forEach(d=>{
    const data = d.data();

    const div = document.createElement("div");
    div.className = "message " + (data.user===user?"me":"other");

    div.innerHTML = `
      <div class="name">${data.name}</div>
      ${data.text}
      <div class="time">${new Date(data.time).toLocaleTimeString()}</div>
    `;

    /* DELETE OWN */
    if(data.user===user){
      const del = document.createElement("span");
      del.innerText=" ❌";
      del.className="delete";
      del.onclick=()=>deleteDoc(doc(db,"publicChat",d.id));
      div.appendChild(del);
    }

    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
});

</script>
