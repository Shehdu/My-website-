<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wadi Soon - Kanhatti Garden</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--bg:#020617;
--card:#0f172a;
--accent:#14b8a6;
--text:#ffffff;
--muted:#cbd5e1;
}

body{
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a);
color:var(--text);
}

/* CONTAINER */
.container{
width:min(500px,92%);
margin:auto;
padding:30px 0 80px;
}

/* HERO */
.hero{text-align:center;margin-bottom:20px;}
.hero h1{
font-size:28px;
background:linear-gradient(90deg,#fff,#38bdf8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
.hero p{color:var(--muted);font-size:14px;margin-top:8px;}

/* CARD */
.card{
background:#0f172a;
padding:22px;
border-radius:16px;
margin:20px 0;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
.card h2{text-align:center;margin-bottom:10px;}
.card p{font-size:14px;color:#e2e8f0;}

/* MAP */
.map-section{
background:#0f172a;
padding:20px;
border-radius:16px;
margin:20px 0;
text-align:center;
}
.map-section iframe{
width:100%;
height:300px;
border-radius:12px;
border:none;
}

/* BUTTON */
.pro-btn,.map-btn{
display:inline-block;
margin-top:15px;
padding:10px 18px;
background:var(--accent);
color:#fff;
border-radius:20px;
font-size:14px;
}

/* INFO */
.info-box{
background:#fff;
color:#000;
padding:20px;
border-radius:16px;
margin:20px 0;
text-align:center;
}
.highlight-box{
background:#0f172a;
padding:20px;
border-radius:16px;
margin:20px 0;
text-align:center;
border:2px solid var(--accent);
}

/* CHAT BUTTON */
.ws-chat-fab{
position:fixed;
bottom:20px;
right:20px;
width:55px;
height:55px;
border-radius:50%;
background:var(--accent);
color:#fff;
border:none;
font-size:22px;
}

/* CHAT BOX */
.ws-chat-widget{
position:fixed;
bottom:90px;
right:20px;
width:320px;
height:450px;
background:#fff;
border-radius:15px;
display:none;
flex-direction:column;
overflow:hidden;
}

.ws-chat-widget.active{display:flex;}

.ws-chat-header{
background:var(--accent);
color:#fff;
padding:10px;
display:flex;
justify-content:space-between;
}

.ws-chat-box{
flex:1;
overflow-y:auto;
padding:10px;
background:#f1f5f9;
}

.ws-message{
margin:6px 0;
padding:8px;
border-radius:10px;
font-size:12px;
}

.ws-myMsg{background:#14b8a6;color:#fff;text-align:right;}
.ws-otherMsg{background:#fff;color:#000;}

.ws-chat-input-area{
display:flex;
padding:10px;
gap:5px;
}

#wsMessageInput{
flex:1;
border:1px solid #ccc;
border-radius:10px;
padding:8px;
}

.ws-send-btn{
background:var(--accent);
color:#fff;
border:none;
padding:8px 12px;
border-radius:10px;
}

footer{text-align:center;margin-top:20px;color:#aaa;font-size:12px;}

</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1>🌿 Wadi Soon Tourism 🌿</h1>
<p>Beautiful nature of Soon Valley</p>
</div>

<div class="card">
<h2>Kanhatti Garden</h2>
<p>Beautiful peaceful tourist place in Soon Valley.</p>
</div>

<div class="map-section">
<h2>📍 Location</h2>
<iframe src="https://www.google.com/maps?q=Soon+Valley&output=embed"></iframe>
<a href="#" class="map-btn">Open Map</a>
</div>

<div class="info-box">
<h3>Sakesar Height</h3>
<p>1522 meters above sea level</p>
</div>

<div class="highlight-box">
<h3>Maiwali Dheri</h3>
<p>Beautiful hilltop view point</p>
</div>

<footer>© 2026 Wadi Soon</footer>

</div>

<button id="chatBtn" class="ws-chat-fab">💬</button>

<div id="chatBox" class="ws-chat-widget">
<div class="ws-chat-header">
<span>Live Chat</span>
<button onclick="toggleChat()">X</button>
</div>

<div id="messages" class="ws-chat-box"></div>

<div class="ws-chat-input-area">
<input id="input" placeholder="Type..." />
<button onclick="sendMsg()" class="ws-send-btn">Send</button>
</div>
</div>

<script>
let chatOpen=false;

function toggleChat(){
chatOpen=!chatOpen;
document.getElementById("chatBox").classList.toggle("active");
}

document.getElementById("chatBtn").onclick=toggleChat;

function sendMsg(){
let input=document.getElementById("input");
let msg=input.value.trim();
if(!msg) return;

let div=document.createElement("div");
div.className="ws-message ws-myMsg";
div.innerText=msg;

document.getElementById("messages").appendChild(div);
input.value="";
}
</script>

</body>
</html>
