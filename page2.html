<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wadi Soon AI Chat</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
  color:#fff;
}

/* HEADER */
.header{
  text-align:center;
  padding:15px;
  font-size:20px;
  background:#020617;
}

/* CHAT BOX */
.chat-container{
  max-width:500px;
  margin:20px auto;
  background:#111;
  border-radius:15px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  height:80vh;
}

/* MESSAGES */
#chatBox{
  flex:1;
  overflow:auto;
  padding:10px;
}

.message{
  margin:8px 0;
  padding:10px;
  border-radius:10px;
}

.me{
  background:#22c55e;
  text-align:right;
}

.other{
  background:#1e293b;
}

/* INPUT */
.input-area{
  padding:10px;
  background:#020617;
  display:flex;
  gap:5px;
}

.input-area input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
}

.input-area button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">🌿 Wadi Soon AI Chat</div>

<div class="chat-container">
  <div id="chatBox"></div>

  <div class="input-area">
    <input id="msg" placeholder="Ask about Wadi Soon...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>

/* AI REPLY */
function aiReply(msg){
  msg = msg.toLowerCase();

  if(msg.includes("wadi soon")){
    return "Wadi Soon Punjab Pakistan ki ek beautiful valley hai 🌿";
  }

  if(msg.includes("lake")){
    return "Uchali Lake aur Khabeki Lake famous hain 🌊";
  }

  if(msg.includes("sakesar")){
    return "Sakesar highest peak hai Soon Valley ki ⛰️";
  }

  if(msg.includes("hotel")){
    return "Yahan local guest houses aur hotels mil jate hain 🏨";
  }

  return "Sorry, mujhe samajh nahi aaya 😅";
}

/* SEND */
function send(){
  const input = document.getElementById("msg");
  const box = document.getElementById("chatBox");

  const text = input.value.trim();
  if(!text) return;

  // user msg
  const userDiv = document.createElement("div");
  userDiv.className = "message me";
  userDiv.innerText = text;
  box.appendChild(userDiv);

  // bot reply
  const botDiv = document.createElement("div");
  botDiv.className = "message other";
  botDiv.innerText = aiReply(text);

  setTimeout(()=>{
    box.appendChild(botDiv);
    box.scrollTop = box.scrollHeight;
  },400);

  input.value="";
}

</script>

</body>
</html>
