<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wadi Soon AI Chat</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
  color:#fff;
}

/* HEADER */
.header{
  text-align:center;
  padding:15px;
  font-size:20px;
  background:#020617;
}

/* CHAT BOX */
.chat-container{
  max-width:500px;
  margin:20px auto;
  background:#111;
  border-radius:20px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  height:85vh;
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

/* CHAT AREA */
#chatBox{
  flex:1;
  overflow:auto;
  padding:12px;
}

/* MESSAGE */
.message{
  margin:8px 0;
  padding:12px;
  border-radius:14px;
  font-size:14px;
  animation:fade .3s;
}

.me{
  background:#22c55e;
  text-align:right;
}

.other{
  background:#1e293b;
}

/* INPUT */
.input-area{
  padding:10px;
  background:#020617;
  display:flex;
  gap:8px;
}

.input-area input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
}

.input-area button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

/* ANIMATION */
@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1;}
}
</style>
</head>

<body>

<div class="header">🌿 Wadi Soon AI Chat</div>

<div class="chat-container">
  <div id="chatBox"></div>

  <div class="input-area">
    <input id="msg" placeholder="Ask about Wadi Soon...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>

/* AI BRAIN */
function aiReply(msg){
  msg = msg.toLowerCase();

  // greetings
  if(msg.includes("hi") || msg.includes("hello") || msg.includes("salam")){
    return "Hello 👋 Main Wadi Soon AI hoon. Aap kya jana chahte hain?";
  }

  if(msg.includes("wadi soon")){
    return "Wadi Soon Punjab Pakistan ki ek beautiful valley hai 🌿";
  }

  if(msg.includes("lake")){
    return "Uchali Lake aur Khabeki Lake famous hain 🌊";
  }

  if(msg.includes("sakesar")){
    return "Sakesar Soon Valley ka highest peak hai ⛰️";
  }

  if(msg.includes("hotel")){
    return "Yahan guest houses aur small hotels mil jate hain 🏨";
  }

  if(msg.includes("location")){
    return "Wadi Soon District Khushab, Punjab Pakistan me hai 📍";
  }

  if(msg.includes("food")){
    return "Yahan local desi food aur chai bohat famous hai 🍲☕";
  }

  return "Sorry, mujhe samajh nahi aaya 😅";
}

/* SEND FUNCTION */
function send(){
  const input = document.getElementById("msg");
  const box = document.getElementById("chatBox");

  const text = input.value.trim();
  if(!text) return;

  // USER MESSAGE
  const userDiv = document.createElement("div");
  userDiv.className = "message me";
  userDiv.innerText = text;
  box.appendChild(userDiv);

  // BOT MESSAGE
  const botDiv = document.createElement("div");
  botDiv.className = "message other";

  setTimeout(()=>{
    botDiv.innerText = aiReply(text);
    box.appendChild(botDiv);
    box.scrollTop = box.scrollHeight;
  },400);

  input.value="";
}

</script>

</body>
</html>
